<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7D1128"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#7D1128"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#1A0A0E"/>
    </linearGradient>
    <linearGradient id="glowBurgundy" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="userSpaceOnUse" id="radial1" x1="600" y1="315" x2="900" y2="600">
    </linearGradient>
    <radialGradient id="glowCircle1" cx="70%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#7D1128" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0F0F0F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCircle2" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F0F0F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowCircle1)"/>
  <rect width="1200" height="630" fill="url(#glowCircle2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#topBar)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#2A1520" stroke-width="1"/>

  <!-- Logo mark — top left -->
  <text x="64" y="100" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" letter-spacing="-1" fill="#FFFFFF">
    <tspan fill="#D4A017">&lt;</tspan>MN<tspan fill="#D4A017">/&gt;</tspan>
  </text>

  <!-- Decorative dots grid — top right -->
  <g opacity="0.18" fill="#D4A017">
    <circle cx="1020" cy="80" r="2.5"/><circle cx="1044" cy="80" r="2.5"/><circle cx="1068" cy="80" r="2.5"/><circle cx="1092" cy="80" r="2.5"/><circle cx="1116" cy="80" r="2.5"/>
    <circle cx="1020" cy="104" r="2.5"/><circle cx="1044" cy="104" r="2.5"/><circle cx="1068" cy="104" r="2.5"/><circle cx="1092" cy="104" r="2.5"/><circle cx="1116" cy="104" r="2.5"/>
    <circle cx="1020" cy="128" r="2.5"/><circle cx="1044" cy="128" r="2.5"/><circle cx="1068" cy="128" r="2.5"/><circle cx="1092" cy="128" r="2.5"/><circle cx="1116" cy="128" r="2.5"/>
    <circle cx="1020" cy="152" r="2.5"/><circle cx="1044" cy="152" r="2.5"/><circle cx="1068" cy="152" r="2.5"/><circle cx="1092" cy="152" r="2.5"/><circle cx="1116" cy="152" r="2.5"/>
  </g>

  <!-- Main name -->
  <text x="64" y="260" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="#FFFFFF">Milani Ncana</text>

  <!-- Title + location -->
  <text x="64" y="320" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="400" fill="#A0A0A0" letter-spacing="0.5">Software Developer · Cape Town, South Africa</text>

  <!-- Divider line -->
  <rect x="64" y="352" width="120" height="3" rx="2" fill="#D4A017"/>

  <!-- Tech stack pills -->
  <!-- Vue 3 -->
  <rect x="64" y="378" width="104" height="38" rx="19" fill="#1A2A1A" stroke="#41B883" stroke-width="1.5"/>
  <text x="116" y="402" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#41B883" text-anchor="middle">Vue 3</text>

  <!-- TypeScript -->
  <rect x="180" y="378" width="148" height="38" rx="19" fill="#0D1A2E" stroke="#3178C6" stroke-width="1.5"/>
  <text x="254" y="402" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#3178C6" text-anchor="middle">TypeScript</text>

  <!-- Java -->
  <rect x="340" y="378" width="96" height="38" rx="19" fill="#2A1A0A" stroke="#D4A017" stroke-width="1.5"/>
  <text x="388" y="402" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#D4A017" text-anchor="middle">Java</text>

  <!-- Spring Boot -->
  <rect x="448" y="378" width="156" height="38" rx="19" fill="#0D1A0D" stroke="#6DB33F" stroke-width="1.5"/>
  <text x="526" y="402" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#6DB33F" text-anchor="middle">Spring Boot</text>

  <!-- Python -->
  <rect x="616" y="378" width="108" height="38" rx="19" fill="#1A1A2E" stroke="#306998" stroke-width="1.5"/>
  <text x="670" y="402" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#6ea8d6" text-anchor="middle">Python</text>

  <!-- Tagline -->
  <text x="64" y="480" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="300" fill="#606060" letter-spacing="0.5">Building full-stack web applications</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0A0A0A"/>
  <text x="64" y="611" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#505050">milanincana.vercel.app</text>

  <!-- Availability dot + label -->
  <circle cx="1080" cy="605" r="6" fill="#4CAF50"/>
  <text x="1094" y="611" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="16" fill="#4CAF50">Available</text>
</svg>
